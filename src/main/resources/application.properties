spring.application.name=Layover_Backend

# 파일 업로드
upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# 서버
server.port=8080

# 프론트url
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# CORS 허용 오리진
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://172.*.*.*:*}

# 인코딩
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=false

# JSON - camelCase 유지 (Vue와 통신할 때)
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

# 로컬 설정 파일 로드
spring.profiles.active=local

# 카카오 REST API 키 (실제 값은 application-local.properties에)
kakao.api.key=

# 대전 버스 API (실제 값은 application-local.properties에)
daejeon.bus.api.key=

# T맵 API 키 (실제 값은 application-local.properties에)
tmap.api.key=

# AI 코스 추천 API
# base-url은 API 포털에서 제공하는 Chat Completions 호환 엔드포인트를 넣어주세요.
ai.course.enabled=true
ai.course.api-key=${AI_COURSE_API_KEY:}
ai.course.base-url=${AI_COURSE_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions}
ai.course.model=${AI_COURSE_MODEL:gpt-4o-mini}

# 메일 (실제 값은 application-local.properties에)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# TourAPI (실제 값은 application-local.properties에)
tour.api.key=

# 코레일 API (인증 불필요 - 공개 샘플 API)
# GET /api/trains?station=daejeon&date=YYYYMMDD

# Redis 설정 (application-local.properties에 실제 값 작성)
