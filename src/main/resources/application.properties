spring.application.name=Layover_Backend
spring.main.allow-bean-definition-overriding=true

# 서버
server.port=8090

# DB 자동설정 끄기 (로컬 profile 없을 때)
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration

# 인코딩
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=false

# JSON - camelCase 유지 (Vue와 통신할 때)
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

# JWT
ssafy.jwt.access-expmin=60
ssafy.jwt.refresh-expmin=1440
ssafy.jwt.secret-string=layover-very-long-and-secure-random-secret-key-12345678

# 카카오 REST API 키 (실제 값은 application-local.properties에)
kakao.api.key=

# 대전 버스 API (실제 값은 application-local.properties에)
daejeon.bus.api.key=

# T맵 API 키 (실제 값은 application-local.properties에)
tmap.api.key=

# 메일 (실제 값은 application-local.properties에)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
